# Template for the plugin-hub manifest file.
# When opening a PR against runelite/plugin-hub, copy this file into
# plugins/color-locked.properties (file name must match the plugin id,
# kebab-case, no spaces).
#
# Update `commit` to the exact commit SHA you want the hub to build,
# and `version` to match build.gradle.

displayName=Color Locked
author=unidarkshin
description=Group Iron color-lock enforcement. Blocks Eat/Drink/Equip/Wield/Wear on items restricted by your assigned color. Strips Mine/Chop when carrying a restricted pickaxe or axe. Marks restricted items with a red overlay in inventory, bank, and worn equipment. Includes a sidebar for looking up which items your color can use. Syncs your assigned color and item rules from a hub group, or runs standalone with manual settings.
support=https://github.com/unidarkshin/osrs-color-lock-runelite/issues
plugins=com.osrscolorlock.colorlock.ColorLockPlugin
repository=https://github.com/unidarkshin/osrs-color-lock-runelite.git
commit=REPLACE_WITH_RELEASE_COMMIT_SHA
version=1.0.0
tags=ironman,gim,groupiron,color-lock,color,lock,restriction
